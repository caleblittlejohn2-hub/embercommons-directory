<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Dashboard — EmberCommons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100;1,9..144,100;1,9..144,200;1,9..144,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--void:#030402;--deep:#0A0E07;--soil:#141A0C;--bark:#1E2714;--jade:#00D48A;--jade-l:#3DFFC0;--ember:#D4720A;--ember-l:#FF9B3A;--gold:#C8A84B;--gold-l:#FFE08A;--p0:#F4EDD8;--p1:#D8CCAA;--p2:#9A8A68;--p3:#4A3E28;--be:rgba(212,114,10,.12);--bel:rgba(212,114,10,.3);--bj:rgba(0,212,138,.1);--bjl:rgba(0,212,138,.25);--bgl:rgba(200,168,75,.25)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--deep);color:var(--p1);font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:300;-webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column}
::selection{background:rgba(200,168,75,.2);color:var(--p0)}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:linear-gradient(var(--gold),var(--ember))}
a{text-decoration:none}

/* AUTH GATE */
#auth-gate{position:fixed;inset:0;z-index:9999;background:var(--void);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;padding:2rem}
#auth-gate.gone{display:none}
.ag-logo{font-family:'Fraunces',serif;font-style:italic;font-weight:100;font-size:1.6rem;color:var(--p0);background:linear-gradient(125deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
.ag-sub{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.2em;text-transform:uppercase;color:var(--p3);margin-bottom:1rem}
.ag-input{width:300px;background:rgba(3,4,2,.9);border:1px solid rgba(200,168,75,.15);border-radius:1px;padding:.82rem 1rem;color:var(--p0);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;outline:none;transition:border-color .3s}
.ag-input:focus{border-color:var(--gold)}
.ag-input::placeholder{color:rgba(154,138,104,.3)}
.ag-btn{width:300px;font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:1rem;color:var(--void);background:linear-gradient(135deg,var(--gold-l),var(--gold));border:none;border-radius:1px;padding:.85rem;cursor:pointer;transition:all .3s;margin-top:.3rem}
.ag-btn:hover{box-shadow:0 6px 22px rgba(200,168,75,.35)}
.ag-err{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ember-l);display:none}
.ag-err.show{display:block}
.ag-link{font-style:italic;font-size:.92rem;color:var(--p3)}
.ag-link a{color:var(--gold);text-decoration:none}

/* LAYOUT */
#shell{display:flex;flex:1;min-height:0}

/* SIDEBAR */
#sidebar{width:220px;flex-shrink:0;background:rgba(5,7,4,.98);border-right:1px solid rgba(200,168,75,.07);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sb-head{padding:1.3rem 1.2rem;border-bottom:1px solid rgba(200,168,75,.06)}
.sb-logo{font-family:'Fraunces',serif;font-style:italic;font-weight:100;font-size:1.1rem;color:var(--p0);background:linear-gradient(125deg,var(--gold-l),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.sb-biz{font-family:'DM Mono',monospace;font-size:.41rem;letter-spacing:.12em;text-transform:uppercase;color:var(--p3);margin-top:.3rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-tier{display:inline-flex;align-items:center;gap:.3rem;font-family:'DM Mono',monospace;font-size:.38rem;letter-spacing:.1em;text-transform:uppercase;padding:.15rem .45rem;border-radius:1px;margin-top:.4rem}
.tier-standard{background:rgba(74,62,40,.25);color:var(--p3);border:1px solid rgba(74,62,40,.4)}
.tier-featured{background:rgba(200,168,75,.08);color:var(--gold);border:1px solid rgba(200,168,75,.18)}
.tier-partner{background:rgba(212,114,10,.1);color:var(--ember-l);border:1px solid rgba(212,114,10,.2)}
.sb-nav{flex:1;padding:.6rem 0}
.sb-section{font-family:'DM Mono',monospace;font-size:.4rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(154,138,104,.3);padding:.5rem 1.2rem;margin-top:.4rem}
.sb-item{display:flex;align-items:center;gap:.6rem;padding:.58rem 1.2rem;font-style:italic;font-size:.95rem;color:var(--p3);cursor:pointer;background:none;border:none;width:100%;text-align:left;transition:all .25s;position:relative}
.sb-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);transform:scaleY(0);transition:transform .25s}
.sb-item:hover{color:var(--p1);background:rgba(200,168,75,.03)}
.sb-item.active{color:var(--gold-l);background:rgba(200,168,75,.04)}
.sb-item.active::before{transform:scaleY(1)}
.sb-icon{font-size:.9rem;width:16px;text-align:center}
.sb-badge{font-family:'DM Mono',monospace;font-size:.38rem;background:var(--ember-l);color:var(--void);border-radius:8px;padding:.08rem .38rem;margin-left:auto;font-style:normal}
.sb-badge.green{background:var(--jade)}
.sb-bottom{padding:1rem 1.2rem;border-top:1px solid rgba(200,168,75,.05)}
.sb-upgrade{display:block;text-align:center;font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);background:rgba(200,168,75,.07);border:1px solid rgba(200,168,75,.15);border-radius:1px;padding:.45rem;cursor:pointer;transition:all .3s;margin-bottom:.6rem;text-decoration:none}
.sb-upgrade:hover{background:rgba(200,168,75,.14)}
.sb-signout{font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.12em;text-transform:uppercase;color:var(--p3);background:none;border:none;cursor:pointer;width:100%;text-align:left;transition:color .25s}
.sb-signout:hover{color:var(--ember-l)}

/* MAIN CONTENT */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.main-header{padding:1.3rem 2rem;border-bottom:1px solid rgba(200,168,75,.06);display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;flex-shrink:0;background:rgba(8,11,6,.95)}
.mh-title{font-family:'Fraunces',serif;font-style:italic;font-weight:100;font-size:1.5rem;color:var(--p0)}
.mh-right{display:flex;gap:.6rem}
.btn-sm{display:inline-flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.14em;text-transform:uppercase;padding:.4rem .9rem;border-radius:1px;cursor:pointer;transition:all .3s;border:1px solid;font-style:normal}
.btn-gold{color:var(--void);background:linear-gradient(135deg,var(--gold-l),var(--gold));border-color:transparent}
.btn-gold:hover{box-shadow:0 4px 16px rgba(200,168,75,.35)}
.btn-outline{color:var(--p2);background:transparent;border-color:var(--be)}
.btn-outline:hover{border-color:var(--bgl);color:var(--gold)}
.btn-jade{color:var(--void);background:linear-gradient(135deg,var(--jade-l),var(--jade));border-color:transparent}
.btn-jade:hover{box-shadow:0 4px 16px rgba(0,212,138,.35)}

/* PANELS */
.panel{display:none;padding:2rem;flex:1}
.panel.active{display:block}

/* OVERVIEW STATS */
.ov-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
.ov-stat{background:linear-gradient(145deg,rgba(20,26,12,.9),rgba(12,18,8,.96));border:1px solid rgba(200,168,75,.08);border-radius:2px;padding:1.3rem 1.4rem;position:relative;overflow:hidden}
.ov-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,.2),transparent)}
.os-n{font-family:'Fraunces',serif;font-style:italic;font-weight:100;font-size:2.4rem;color:var(--gold-l);line-height:1;text-shadow:0 0 20px rgba(200,168,75,.3)}
.os-l{font-family:'DM Mono',monospace;font-size:.43rem;letter-spacing:.14em;text-transform:uppercase;color:var(--p3);margin-top:.35rem}

/* UPGRADE PROMPT (shown for standard/missing features) */
.upgrade-prompt{background:linear-gradient(145deg,rgba(22,18,6,.97),rgba(14,12,4,.99));border:1px solid rgba(200,168,75,.15);border-radius:2px;padding:2rem;text-align:center;position:relative;overflow:hidden}
.upgrade-prompt::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,.5),transparent)}
.up-icon{font-size:2rem;margin-bottom:.8rem;display:block}
.up-title{font-family:'Fraunces',serif;font-style:italic;font-weight:100;font-size:1.3rem;color:var(--p0);margin-bottom:.4rem}
.up-body{font-style:italic;font-size:.95rem;color:var(--p3);line-height:1.9;margin-bottom:1.2rem;max-width:400px;margin-left:auto;margin-right:auto}
.up-limit{font-family:'DM Mono',monospace;font-size:.44rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ember-l);margin-bottom:1rem}

/* TABLES */
.data-table{width:100%;border-collapse:collapse;margin-bottom:1.5rem}
.data-table th{font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.16em;text-transform:uppercase;color:var(--p3);text-align:left;padding:.7rem 1rem;border-bottom:1px solid rgba(200,168,75,.07);font-style:normal;font-weight:400}
.data-table td{padding:.72rem 1rem;border-bottom:1px solid rgba(200,168,75,.04);font-size:.96rem;color:var(--p2);vertical-align:middle}
.data-table tr:hover td{background:rgba(200,168,75,.02)}
.status-pill{font-family:'DM Mono',monospace;font-size:.4rem;letter-spacing:.1em;text-transform:uppercase;padding:.16rem .5rem;border-radius:1px;font-style:normal}
.s-draft{background:rgba(74,62,40,.3);color:var(--p3);border:1px solid rgba(74,62,40,.4)}
.s-sent{background:rgba(200,168,75,.08);color:var(--gold);border:1px solid rgba(200,168,75,.2)}
.s-paid{background:rgba(0,212,138,.08);color:var(--jade);border:1px solid var(--bj)}
.s-overdue{background:rgba(212,114,10,.1);color:var(--ember-l);border:1px solid rgba(212,114,10,.2)}

/* INVOICE COUNTER */
.invoice-counter{background:rgba(212,114,10,.06);border:1px solid rgba(212,114,10,.12);border-radius:1px;padding:.7rem 1rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.ic-text{font-style:italic;font-size:.95rem;color:var(--p2)}
.ic-text strong{color:var(--ember-l);font-weight:400;font-style:normal}
.ic-upgrade{font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);background:none;border:none;cursor:pointer;transition:color .25s}
.ic-upgrade:hover{color:var(--gold-l)}

/* FORMS */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.form-grid.full{grid-template-columns:1fr}
.f-field{display:flex;flex-direction:column;gap:.35rem}
.f-field label{font-family:'DM Mono',monospace;font-size:.43rem;letter-spacing:.18em;text-transform:uppercase;color:var(--p3);font-style:normal}
.f-field input,.f-field select,.f-field textarea{background:rgba(3,4,2,.9);border:1px solid rgba(200,168,75,.12);border-radius:1px;padding:.75rem .9rem;color:var(--p0);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.97rem;outline:none;transition:border-color .3s}
.f-field input:focus,.f-field select:focus,.f-field textarea:focus{border-color:var(--gold)}
.f-field input::placeholder,.f-field textarea::placeholder{color:rgba(154,138,104,.25)}
.f-field select{-webkit-appearance:none;cursor:pointer}
.f-field select option{background:#0A0E07}
.f-field textarea{resize:vertical;min-height:90px}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}}

/* MESSAGES */
.msg-thread{background:rgba(12,18,8,.9);border:1px solid rgba(200,168,75,.08);border-radius:2px;margin-bottom:1rem;overflow:hidden}
.mt-header{padding:.9rem 1.1rem;border-bottom:1px solid rgba(200,168,75,.05);display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .25s}
.mt-header:hover{background:rgba(200,168,75,.03)}
.mt-client{font-style:italic;font-size:.97rem;color:var(--p1)}
.mt-preview{font-style:italic;font-size:.9rem;color:var(--p3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px}
.mt-time{font-family:'DM Mono',monospace;font-size:.4rem;letter-spacing:.1em;text-transform:uppercase;color:var(--p3);flex-shrink:0;font-style:normal}
.mt-unread{width:6px;height:6px;border-radius:50%;background:var(--jade);flex-shrink:0}

/* PROFILE section */
.profile-listing-card{background:linear-gradient(145deg,rgba(20,26,12,.9),rgba(12,18,8,.96));border:1px solid rgba(200,168,75,.1);border-radius:2px;padding:1.8rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.plc-icon{font-size:2.5rem;filter:drop-shadow(0 0 12px rgba(200,168,75,.25))}
.plc-info{}
.plc-name{font-family:'Fraunces',serif;font-style:italic;font-weight:100;font-size:1.4rem;color:var(--p0)}
.plc-cat{font-family:'DM Mono',monospace;font-size:.43rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ember-l);margin-top:.2rem;font-style:normal}
.plc-status{display:inline-flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.42rem;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-top:.4rem;font-style:normal}
.plc-status::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--jade);box-shadow:0 0 6px var(--jade)}

/* Dividers */
.panel-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(200,168,75,.1),rgba(0,212,138,.06),transparent);margin:2rem 0}
.empty-panel{text-align:center;padding:4rem 2rem}
.ep-icon{font-size:2.5rem;margin-bottom:.8rem;display:block;opacity:.3}
.ep-title{font-family:'Fraunces',serif;font-style:italic;font-weight:100;font-size:1.2rem;color:var(--p2);margin-bottom:.4rem}
.ep-body{font-style:italic;font-size:.93rem;color:var(--p3);line-height:1.9}
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="ag-logo">EmberCommons</div>
  <div class="ag-sub">Business Dashboard · Sign In</div>
  <input class="ag-input" type="email" id="ag-email" placeholder="your@email.com" onkeydown="if(event.key==='Enter')document.getElementById('ag-pass').focus()">
  <input class="ag-input" type="password" id="ag-pass" placeholder="Password" onkeydown="if(event.key==='Enter')signIn()" style="margin-top:.5rem">
  <button class="ag-btn" onclick="signIn()">✦ Sign In to Dashboard</button>
  <div class="ag-err" id="ag-err"></div>
  <div class="ag-link">Don't have a listing? <a href="onboard.html">Apply to join →</a></div>
</div>

<div id="shell">

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">EmberCommons</div>
    <div class="sb-biz" id="sb-biz-name">Loading...</div>
    <div class="sb-tier tier-standard" id="sb-tier">Standard</div>
  </div>
  <div class="sb-nav">
    <div class="sb-section">Dashboard</div>
    <button class="sb-item active" onclick="nav('overview')" id="nav-overview"><span class="sb-icon">📊</span>Overview</button>
    <button class="sb-item" onclick="nav('profile')" id="nav-profile"><span class="sb-icon">✦</span>My Listing</button>
    <div class="sb-section">Clients</div>
    <button class="sb-item" onclick="nav('clients')" id="nav-clients"><span class="sb-icon">👥</span>Clients</button>
    <button class="sb-item" onclick="nav('invoices')" id="nav-invoices"><span class="sb-icon">🧾</span>Invoices <span class="sb-badge" id="badge-invoices" style="display:none">0</span></button>
    <button class="sb-item" onclick="nav('messages')" id="nav-messages"><span class="sb-icon">💬</span>Messages <span class="sb-badge green" id="badge-msgs" style="display:none">0</span></button>
    <div class="sb-section">Publication</div>
    <button class="sb-item" onclick="nav('blog-access')" id="nav-blog-access"><span class="sb-icon">📝</span>Weekly Blog</button>
  </div>
  <div class="sb-bottom">
    <a href="onboard.html" class="sb-upgrade" id="sb-upgrade-btn">✦ Upgrade Listing</a>
    <button class="sb-signout" onclick="signOut()">Sign Out</button>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div class="main-header">
    <div class="mh-title" id="mh-title">Overview</div>
    <div class="mh-right" id="mh-right"></div>
  </div>

  <!-- OVERVIEW -->
  <div class="panel active" id="panel-overview">
    <div class="ov-stats">
      <div class="ov-stat"><div class="os-n" id="ov-views">—</div><div class="os-l">Profile Views</div></div>
      <div class="ov-stat"><div class="os-n" id="ov-clients">—</div><div class="os-l">Clients</div></div>
      <div class="ov-stat"><div class="os-n" id="ov-invoices">—</div><div class="os-l">Invoices Sent</div></div>
      <div class="ov-stat"><div class="os-n" id="ov-revenue">—</div><div class="os-l">Invoiced (30d)</div></div>
    </div>
    <div id="overview-listing"></div>
    <div class="panel-divider"></div>
    <div id="overview-upsell"></div>
  </div>

  <!-- PROFILE -->
  <div class="panel" id="panel-profile">
    <div id="profile-content"></div>
  </div>

  <!-- CLIENTS -->
  <div class="panel" id="panel-clients">
    <div id="clients-content"></div>
  </div>

  <!-- INVOICES -->
  <div class="panel" id="panel-invoices">
    <div id="invoices-content"></div>
  </div>

  <!-- MESSAGES -->
  <div class="panel" id="panel-messages">
    <div id="messages-content"></div>
  </div>

  <!-- BLOG ACCESS -->
  <div class="panel" id="panel-blog-access">
    <div id="blog-access-content"></div>
  </div>

</div><!-- /main -->
</div><!-- /shell -->

<script>
const SB='https://rqytpqaswofdwhmsaykn.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxeXRwcWFzd29mZHdobXNheWtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTU5MzksImV4cCI6MjA4ODQ5MTkzOX0.vzsT4oWSxKoWzfDmw7SaCaImA6_SshYwuLA9_nmNHtg';
const sb=supabase.createClient(SB,SK);
let user=null,listing=null;

const TIER_LIMITS={standard:{invoices:3,messages:false,blog:false},featured:{invoices:25,messages:true,blog:1},partner:{invoices:999,messages:true,blog:4}};
const ICONS={'home-services':'🏠','healthcare':'⚕️','education':'🎓','technology':'💻','beauty-wellness':'✨','food-beverage':'🍽️','professional':'💼','arts-creative':'🎨','retail':'🛍️','community':'🤝','media':'📚'};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt$(c){return'$'+(c/100).toFixed(2)}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—'}

/* AUTH */
async function signIn(){
  const email=document.getElementById('ag-email').value.trim();
  const pass=document.getElementById('ag-pass').value;
  const err=document.getElementById('ag-err');
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){err.textContent=error.message;err.classList.add('show');}
  else{user=data.user;document.getElementById('auth-gate').classList.add('gone');boot();}
}
function signOut(){sb.auth.signOut().then(()=>location.reload());}
sb.auth.getSession().then(({data:{session}})=>{if(session){user=session.user;document.getElementById('auth-gate').classList.add('gone');boot();}});

/* BOOT */
async function boot(){
  const{data}=await sb.from('ember_directory_listings').select('*').eq('owner_id',user.id).maybeSingle();
  if(!data){
    document.getElementById('panel-overview').innerHTML=`<div class="empty-panel"><span class="ep-icon">✦</span><div class="ep-title">No listing found.</div><p class="ep-body">You don't have a listing yet. <a href="onboard.html" style="color:var(--gold)">Apply to join EmberCommons →</a></p></div>`;
    return;
  }
  listing=data;
  const tier=listing.tier||'standard';
  document.getElementById('sb-biz-name').textContent=listing.business_name||'My Business';
  const tierEl=document.getElementById('sb-tier');
  tierEl.textContent=tier.charAt(0).toUpperCase()+tier.slice(1);
  tierEl.className='sb-tier tier-'+tier;
  if(tier==='partner')document.getElementById('sb-upgrade-btn').style.display='none';

  await Promise.all([loadOverview(),loadProfile(),loadClients(),loadInvoices(),loadMessages(),loadBlogAccess()]);
}

/* OVERVIEW */
async function loadOverview(){
  const tier=listing.tier||'standard';
  const[{count:vCount},{count:cCount},{data:invData}]=await Promise.all([
    sb.from('ec_listing_views').select('id',{count:'exact',head:true}).eq('listing_id',listing.id),

function showNewInvoice(){
  const tier=listing.tier||'standard';
  const limit=TIER_LIMITS[tier]?.invoices||3;
  // Count active invoices first
  sb.from('ec_invoices').select('id',{count:'exact',head:true}).eq('listing_id',listing.id).neq('status','cancelled').then(({count})=>{
    if(count>=limit&&tier==='standard'){
      document.getElementById('invoices-content').insertAdjacentHTML('afterbegin',`<div class="upgrade-prompt" style="margin-bottom:1.5rem">
        <span class="up-icon">🧾</span>
        <div class="up-title">Invoice limit reached.</div>
        <p class="up-body">Standard listings include 3 invoices per month. Upgrade to Featured for 25 invoices, or Partner for unlimited.</p>
        <div class="up-limit">${count} of ${limit} used</div>
        <a href="onboard.html" class="btn-sm btn-gold" style="display:inline-flex">✦ Upgrade to Featured</a>
      </div>`);
      return;
    }
    document.getElementById('new-invoice-form').style.display='block';
  });
}

async function createInvoice(){
  const email=document.getElementById('inv-email')?.value.trim();
  const amount=parseFloat(document.getElementById('inv-amount')?.value||0);
  const title=document.getElementById('inv-title')?.value||'Invoice';
  const desc=document.getElementById('inv-desc')?.value||null;
  const due=document.getElementById('inv-due')?.value||null;
  const msg=document.getElementById('inv-msg');
  if(!email||!amount){if(msg){msg.textContent='Client email and amount required.';msg.style.color='var(--ember-l)';msg.style.display='block';}return;}
  const num=`EC-${Date.now().toString().slice(-6)}`;
  const totalCents=Math.round(amount*100);
  const{error}=await sb.from('ec_invoices').insert({
    listing_id:listing.id,invoice_number:num,title,
    line_items:JSON.stringify([{description:desc||title,quantity:1,unit_price:totalCents,total:totalCents}]),
    subtotal_cents:totalCents,total_cents:totalCents,
    due_date:due||null,status:'sent',sent_at:new Date().toISOString(),
    notes:null
  });
  if(error){if(msg){msg.textContent='Error creating invoice.';msg.style.color='var(--ember-l)';msg.style.display='block';}return;}
  if(msg){msg.textContent=`✦ Invoice ${num} created and sent.`;msg.style.display='block';}
  setTimeout(()=>{document.getElementById('new-invoice-form').style.display='none';loadInvoices();},1500);
}

  const excerpt=document.getElementById('blog-excerpt')?.value.trim();
  const cat=document.getElementById('blog-cat')?.value;
  const readtime=parseInt(document.getElementById('blog-readtime')?.value||3);
  const msg=document.getElementById('blog-submit-msg');
  if(!title||!content){if(msg){msg.textContent='Title and content are required.';msg.style.color='var(--ember-l)';msg.style.display='block';}return;}
  const slug=title.toLowerCase().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').slice(0,60)+'-'+Date.now().toString().slice(-4);
  const{error}=await sb.from('ec_blog_posts').insert({title,slug,excerpt:excerpt||null,content,category_slug:cat,author_name:listing.business_name,author_role:'EmberCommons Member',read_minutes:readtime,is_published:false,is_weekly:false,listed_business_id:listing.id});
  if(error){if(msg){msg.textContent='Error submitting.';msg.style.color='var(--ember-l)';msg.style.display='block';}return;}
  if(msg){msg.textContent='✦ Submitted for editorial review. We\'ll be in touch within 5 business days.';msg.style.color='var(--jade)';msg.style.display='block';}
  ['blog-title','blog-content','blog-excerpt'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

/* NAV */
const panelTitles={overview:'Overview',profile:'My Listing',clients:'Clients',invoices:'Invoices',messages:'Messages','blog-access':'Weekly Blog'};
const panelActions={
  clients:'<button class="btn-sm btn-gold" onclick="showAddClient()">+ Add Client</button>',
  invoices:'<button class="btn-sm btn-gold" onclick="showNewInvoice()">+ New Invoice</button>',
  messages:'<button class="btn-sm btn-jade" onclick="showComposeMsg()">+ New Message</button>',
};
function nav(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id)?.classList.add('active');
  document.getElementById('nav-'+id)?.classList.add('active');
  document.getElementById('mh-title').textContent=panelTitles[id]||id;
  document.getElementById('mh-right').innerHTML=panelActions[id]||'';
}
</script>
